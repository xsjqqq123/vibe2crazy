  <!-- Left code bracket < -->
  <path d="M6 14L3 16L6 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

  <!-- Right code bracket > -->
  <path d="M26 14L29 16L26 18" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad1" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
